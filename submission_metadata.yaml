ai_usage_summary: |
  Used Gemini for code optimization, debugging, and drafting the presentation. 
  Used Claude for architectural concepts and verifying timeline logic constraints. 
  No candidate data was shared with external API services.

methodology_summary: |
  We built a self-contained ranking pipeline with refined timeline integrity filters. 
  By tracking technology launch years (e.g. QLoRA, LangChain) and checking skill duration vs. 
  years of experience (YoE), we fully eliminate keyword-stuffer honeypots. Candidates are scored 
  using a blend of technical experience, current title relevance, product company bonuses, 
  and "plain-language" career description keyword counts (rewarding true systems-builders). 
  Behavioral signals (notice period, platform activity, saves) act as multipliers.

